name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_glob: "dist/CloakBrowser-Manager-*.dmg"
          - os: windows-latest
            artifact_glob: "dist/CloakBrowser-Manager-*-Setup.exe"
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ inputs.version }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          if [[ "$(uname)" == "Darwin" ]]; then
            sed -i '' "s/^version = .*/version = \"${V}\"/" pyproject.toml
          else
            sed -i "s/^version = .*/version = \"${V}\"/" pyproject.toml
          fi
          echo "Building v${V}"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packaging/requirements-desktop.txt

      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install innosetup -y --no-progress
          echo "C:/Program Files (x86)/Inno Setup 6" >> "$GITHUB_PATH"

      - name: Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: chmod +x scripts/build-macos.sh && ./scripts/build-macos.sh --all-archs

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CloakBrowser Manager ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
